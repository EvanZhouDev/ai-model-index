name: Sync Leaderboards

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Sync data
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: node ./src/sync.mjs

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          snapshot_date="$(date -u +%m-%d-%Y)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update leaderboard snapshots (${snapshot_date})"
          git push
